name: Release XCFramework

on:
  push:
    tags:
      - 'v*'

jobs:
  build-xcframework:
    name: Build & publish iOS XCFramework
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update VERSION_NAME in gradle.properties
        run: |
          sed -i '' "s|^VERSION_NAME=.*|VERSION_NAME=${{ steps.version.outputs.VERSION }}|" gradle.properties

      - name: Assemble XCFramework
        run: ./gradlew :shared:assembleSurfAPIKitReleaseXCFramework --no-daemon

      - name: Zip XCFramework
        id: zip
        run: |
          cd shared/build/XCFrameworks/release
          zip -r SurfAPIKit.xcframework.zip SurfAPIKit.xcframework
          CHECKSUM=$(swift package compute-checksum SurfAPIKit.xcframework.zip)
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
          mv SurfAPIKit.xcframework.zip $GITHUB_WORKSPACE/SurfAPIKit.xcframework.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SurfAPIKit.xcframework.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Update Package.swift
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          CHECKSUM=${{ steps.zip.outputs.CHECKSUM }}
          URL="https://github.com/Surf-DevOps/SurfAPIKitMP/releases/download/v$VERSION/SurfAPIKit.xcframework.zip"
          cat > Package.swift <<EOF
          // swift-tools-version: 5.9
          import PackageDescription

          // Atualizado automaticamente pelo workflow .github/workflows/release.yml a cada tag.
          let package = Package(
              name: "SurfAPIKit",
              platforms: [
                  .iOS(.v13)
              ],
              products: [
                  .library(name: "SurfAPIKit", targets: ["SurfAPIKit"])
              ],
              targets: [
                  .binaryTarget(
                      name: "SurfAPIKit",
                      url: "$URL",
                      checksum: "$CHECKSUM"
                  )
              ]
          )
          EOF

      - name: Commit Package.swift to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add Package.swift
          if ! git diff --staged --quiet; then
            git commit -m "chore: update Package.swift for v${{ steps.version.outputs.VERSION }}"
            git push origin main
          fi
